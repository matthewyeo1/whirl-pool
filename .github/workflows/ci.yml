name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure
      run: cmake -B build_ci -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF -DCI_BUILD=ON
    
    - name: Build
      run: cmake --build build_ci --config Release
    
    - name: Run tests (skip MPMC and Stack)
      run: |
        # Run all relevant tests on Linux; explicitly include test groups except MPMC and Stack
        ./build_ci/tests --gtest_filter="test_pool_*:test_spsc_*:test_ring_buffer_*:test_hashmap_*:test_counter_*:test_rcu_*:test_simple_rcu_*"

  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure
      run: cmake -B build_ci -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF -DCI_BUILD=ON

    - name: Build
      run: cmake --build build_ci --config Release

    - name: Run all tests
      run: |
        # Run the full test suite on Windows (includes MPMC and Stack tests)
        ./build_ci/Release/tests.exe

    