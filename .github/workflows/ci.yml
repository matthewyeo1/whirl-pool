name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure
      run: cmake -B build_ci -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF -DCI_BUILD=ON
    
    - name: Build
      run: cmake --build build_ci --config Release
    
    - name: Run tests (skip MPMC and Stack)
      run: |
        # Run all tests except MPMC and Stack variants on Linux to avoid known hangs
        ./build_ci/tests --gtest_filter="*-test_mpmc_*:test_stack_*"

  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure
      run: cmake -B build_ci -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF -DCI_BUILD=ON
    
    - name: Build
      run: cmake --build build_ci --config Release
    
    - name: Run SPSC tests
      run: ./build_ci/Release/tests.exe --gtest_filter="test_spsc_*"
    
    - name: Run Pool tests
      run: ./build_ci/Release/tests.exe --gtest_filter="test_pool_*"
    
    - name: Run Stack tests
      run: ./build_ci/Release/tests.exe --gtest_filter="test_stack_*"
    
    - name: Run MPMC basic
      run: ./build_ci/Release/tests.exe --gtest_filter="test_mpmc_basic"
    
    - name: Run MPMC empty
      run: ./build_ci/Release/tests.exe --gtest_filter="test_mpmc_empty"
    
    - name: Run MPMC single producer single consumer
      run: ./build_ci/Release/tests.exe --gtest_filter="test_mpmc_single_producer_single_consumer"
    
    - name: Run MPMC multi producer single consumer
      run: ./build_ci/Release/tests.exe --gtest_filter="test_mpmc_multi_producer_single_consumer"
    
    - name: Run MPMC multi producer multi consumer
      run: ./build_ci/Release/tests.exe --gtest_filter="test_mpmc_multi_producer_multi_consumer"

    