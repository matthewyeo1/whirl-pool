name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure
      run: cmake -B build_ci -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF -DCI_BUILD=ON
    
    - name: Build
      run: cmake --build build_ci --config Release
    
    - name: Test
      run: ./build_ci/tests

  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure
      run: cmake -B build_ci -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF -DCI_BUILD=ON
    
    - name: Build
      run: cmake --build build_ci --config Release
    
    - name: Test
      run: ./build_ci/Release/tests.exe