name: CI

on: [push, pull_request]

jobs:
  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: cmake -B build -DBUILD_TESTS=ON
    - name: Build
      run: cmake --build build --config Release
    - name: Test
      run: ./build/Release/tests.exe

  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: cmake -B build -DBUILD_TESTS=ON
    - name: Build
      run: cmake --build build --config Release
    - name: Test
      run: ./build/tests