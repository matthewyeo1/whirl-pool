name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure
      run: cmake -B build_ci -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF -DCI_BUILD=ON
    
    - name: Build
      run: cmake --build build_ci --config Release
    
    - name: Run tests (skip MPMC and Stack)
      run: |
        # Run all tests except MPMC and Stack variants on Linux to avoid known hangs
        ./build_ci/tests --gtest_filter="* -test_mpmc_*:test_stack_*"

  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure
      run: cmake -B build_ci -DBUILD_TESTS=ON -DBUILD_BENCHMARKS=OFF -DCI_BUILD=ON

    - name: Build
      run: cmake --build build_ci --config Release

    - name: Run all tests
      run: |
        # Run the full test suite on Windows (includes MPMC and Stack tests)
        ./build_ci/Release/tests.exe

    